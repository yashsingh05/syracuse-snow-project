name: Poll Syracuse Snow Routes

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run poller
        run: python poll_syracuse_snow.py

      - name: Commit new snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/*.json
          git diff --staged --quiet || git commit -m "Add snow route snapshot $(date -u +%Y%m%dT%H%M%SZ)"
          git push